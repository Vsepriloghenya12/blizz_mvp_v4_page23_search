<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Близз — мокап Поиска (Editorial Blue, light)</title>
<style>
  :root {
    --brand-primary: #0B3D99;
    --brand-primary-soft: #EAF1FF;
    --brand-primary-on: #FFFFFF;
    --surface-bg: #FAFAF7;
    --surface-surface: #FFFFFF;
    --surface-muted: #F4F6F9;
    --text-primary: #101828;
    --text-secondary: #667085;
    --text-muted: #98A2B3;
    --border-default: #D9E3F2;
    --border-subtle: #EEF2F8;
    --radius-md: 12px;
    --radius-lg: 20px;
    --radius-pill: 9999px;
    --shadow-sm: 0 1px 2px rgba(11, 61, 153, 0.06), 0 1px 3px rgba(11, 61, 153, 0.04);
    --font: Inter, -apple-system, "SF Pro Text", "Segoe UI", Roboto, system-ui, sans-serif;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    padding: 32px 16px;
    background: #0E1116;
    font-family: var(--font);
    color: #E7ECF3;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
  }
  .label { text-align: center; font-size: 13px; color: #8A93A4; margin-bottom: 24px; }
  .label b { color: #E7ECF3; }
  .phone {
    width: 100%;
    max-width: 380px;
    margin: 0 auto;
    border-radius: 42px;
    border: 8px solid #0B0E14;
    background: var(--surface-bg);
    overflow: hidden;
    box-shadow: 0 30px 80px rgba(0,0,0,0.5);
    color: var(--text-primary);
    font-size: 13px;
  }
  .statusbar { display: flex; justify-content: space-between; align-items: center; padding: 10px 20px 4px; font-size: 11px; font-weight: 600; }
  .statusbar .right { display: flex; gap: 6px; align-items: center; }
  .statusbar .dot { width: 5px; height: 5px; border-radius: 50%; background: #101828; }

  /* Top bar */
  .topbar {
    display: flex; align-items: center; gap: 12px;
    padding: 4px 16px 12px;
  }
  .back-btn {
    width: 36px; height: 36px;
    border-radius: 18px;
    background: var(--surface-surface);
    border: 1px solid var(--border-default);
    display: flex; align-items: center; justify-content: center;
    color: var(--text-primary);
  }
  .title { font-size: 22px; font-weight: 800; letter-spacing: -0.4px; }
  .subtitle { color: var(--text-secondary); font-size: 12px; margin-top: 2px; }

  /* Search box */
  .search-box {
    margin: 0 16px 12px;
    display: flex; align-items: center; gap: 10px;
    background: var(--surface-surface);
    border: 1px solid var(--border-default);
    border-radius: 18px;
    padding: 12px 14px;
  }
  .search-box .ic { color: var(--text-secondary); }
  .search-box input {
    border: none; outline: none; flex: 1;
    background: transparent;
    font: inherit; color: var(--text-primary);
  }
  .search-box input::placeholder { color: var(--text-muted); }
  .clear-btn {
    width: 24px; height: 24px;
    display: flex; align-items: center; justify-content: center;
    color: var(--text-secondary);
    font-size: 18px;
  }

  /* Tabs pill */
  .tabs {
    display: flex; gap: 8px;
    padding: 4px 16px 14px;
    overflow-x: auto;
  }
  .tab {
    padding: 8px 14px;
    border-radius: var(--radius-pill);
    background: var(--surface-surface);
    border: 1px solid var(--border-default);
    font-size: 12px;
    font-weight: 800;
    color: var(--brand-primary);
    white-space: nowrap;
  }
  .tab.active { background: var(--brand-primary); color: var(--brand-primary-on); border-color: var(--brand-primary); }

  /* Section */
  .section {
    padding: 0 16px;
  }
  .section-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 0 8px;
  }
  .section-title {
    font-size: 11px;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 0.6px;
    color: var(--text-secondary);
  }
  .clear-all {
    color: var(--brand-primary);
    font-size: 12px;
    font-weight: 800;
  }

  /* Recent row */
  .recent {
    display: flex; align-items: center; gap: 12px;
    padding: 12px 14px;
    background: var(--surface-surface);
    border: 1px solid var(--border-subtle);
    border-radius: var(--radius-lg);
    margin-bottom: 6px;
  }
  .recent-icon {
    width: 36px; height: 36px;
    border-radius: 18px;
    background: var(--brand-primary-soft);
    color: var(--brand-primary);
    display: flex; align-items: center; justify-content: center;
  }
  .recent-body { flex: 1; min-width: 0; }
  .recent-title { font-size: 14px; font-weight: 700; }
  .recent-sub { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }
  .recent-x {
    width: 30px; height: 30px;
    display: flex; align-items: center; justify-content: center;
    color: var(--text-secondary);
    font-size: 22px;
    font-weight: 600;
  }

  /* Result row */
  .result {
    display: flex; align-items: center; gap: 12px;
    padding: 12px 14px;
    background: var(--surface-surface);
    border: 1px solid var(--border-subtle);
    border-radius: var(--radius-lg);
    margin-bottom: 6px;
  }
  .result-avatar {
    width: 44px; height: 44px;
    border-radius: 22px;
    background: var(--brand-primary-soft);
    color: var(--brand-primary);
    display: flex; align-items: center; justify-content: center;
    font-weight: 800; font-size: 16px;
  }
  .result-body { flex: 1; min-width: 0; }
  .result-type {
    color: var(--brand-primary);
    font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.5px;
  }
  .result-title { font-size: 14px; font-weight: 800; margin-top: 2px; }
  .result-sub { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }
  .result-chevron { color: var(--text-secondary); font-size: 22px; }

  .icon-set { width: 18px; height: 18px; stroke: currentColor; fill: none; stroke-width: 1.75; stroke-linecap: round; stroke-linejoin: round; }
</style>
</head>
<body>
<div class="label"><b>Поиск</b> — Editorial Blue, light theme</div>

<div class="phone">

  <div class="search-box">

    <input placeholder="Найти людей, места, бизнесы..." />

  <div class="tabs">

  <div class="section">
    <div class="section-header">

  </div>

  <div class="section">
    <div class="recent">

    <div class="recent">
      <div class="recent-icon">
        <svg class="icon-set" viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg>
      </div>
      <div class="recent-body">
        <div class="recent-title">Кофейни Арбат</div>
        <div class="recent-sub">Места</div>
      </div>
      <div class="recent-x">×</div>
    </div>

    <div class="recent">
      <div class="recent-icon">
        <svg class="icon-set" viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg>
      </div>
      <div class="recent-body">
        <div class="recent-title">Diner 24</div>
        <div class="recent-sub">Бизнес</div>
      </div>
      <div class="recent-x">×</div>
    </div>

    <div class="recent">
      <div class="recent-icon">
        <svg class="icon-set" viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg>
      </div>
      <div class="recent-body">
        <div class="recent-title">завтраки</div>
        <div class="recent-sub">Посты</div>
      </div>
      <div class="recent-x">×</div>
    </div>
  </div>
</div>
</body>
</html>

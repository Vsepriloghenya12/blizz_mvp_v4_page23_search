<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Близз — мокап Главной (Editorial Blue, dark)</title>
<style>
  :root {
    --brand-primary: #3D6CFF;
    --brand-primary-soft: #1A2342;
    --brand-primary-on: #FFFFFF;
    --brand-accent: #7DA4FF;
    --surface-bg: #0B0F1A;
    --surface-surface: #15192C;
    --surface-muted: #0E1220;
    --text-primary: #F5F7FF;
    --text-secondary: #A4B0D6;
    --text-muted: #6F7A99;
    --border-default: #1F2540;
    --border-subtle: #15192C;
    --content-like: #FB7185;
    --content-story: #FFA968;
    --content-offer: #32D583;
    --radius-pill: 9999px;
    --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.4);
    --font: Inter, -apple-system, "SF Pro Text", "Segoe UI", Roboto, system-ui, sans-serif;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; padding: 32px 16px;
    background: #050810;
    font-family: var(--font);
    color: #E7ECF3;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
  }
  .label { text-align: center; font-size: 13px; color: #8A93A4; margin-bottom: 24px; }
  .label b { color: #E7ECF3; }
  .phone {
    width: 100%;
    max-width: 380px;
    margin: 0 auto;
    border-radius: 42px;
    border: 8px solid #050810;
    background: var(--surface-bg);
    overflow: hidden;
    box-shadow: 0 30px 80px rgba(0,0,0,0.7);
    color: var(--text-primary);
    font-size: 13px;
  }
  .statusbar { display: flex; justify-content: space-between; align-items: center; padding: 10px 20px 4px; font-size: 11px; font-weight: 600; color: var(--text-primary); }
  .statusbar .right { display: flex; gap: 6px; align-items: center; }
  .statusbar .dot { width: 5px; height: 5px; border-radius: 50%; background: var(--text-primary); }

  .topbar { display: flex; align-items: center; justify-content: space-between; padding: 8px 18px 16px; }
  .logo { color: var(--brand-primary); font-size: 27px; font-weight: 900; font-style: italic; letter-spacing: -1.2px; }
  .icon-btn { width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; border-radius: 12px; color: var(--text-primary); }

  .stories { display: flex; gap: 14px; padding: 0 18px 18px; overflow-x: auto; }
  .story { display: flex; flex-direction: column; align-items: center; gap: 6px; min-width: 64px; }
  .story-ring {
    width: 64px; height: 64px;
    border-radius: 32px;
    padding: 2.5px;
    background: var(--border-default);
  }
  .story-ring.unseen {
    background: linear-gradient(135deg, var(--brand-primary), var(--brand-accent));
  }
  .story-ring.self {
    background: transparent;
    border: 2px dashed var(--brand-primary);
    display: flex; align-items: center; justify-content: center;
    color: var(--brand-primary);
    font-size: 28px; font-weight: 500;
  }
  .story-inner {
    width: 100%; height: 100%;
    border-radius: 30px;
    background: var(--brand-primary-soft);
    display: flex; align-items: center; justify-content: center;
    font-weight: 800; color: var(--brand-primary);
    font-size: 18px;
  }
  .story-name { font-size: 11px; line-height: 1.2; text-align: center; max-width: 70px; color: var(--text-secondary); }

  .home-tabs {
    margin: 0 18px;
    background: var(--surface-surface);
    border: 1.5px solid var(--brand-primary);
    border-radius: var(--radius-pill);
    padding: 4px;
    display: flex;
  }
  .home-tab {
    flex: 1; text-align: center; padding: 10px;
    border-radius: var(--radius-pill);
    font-weight: 800; font-size: 14px; color: var(--brand-primary);
  }
  .home-tab.active { background: var(--brand-primary); color: var(--brand-primary-on); }

  .post {
    background: var(--surface-surface);
    border-top: 8px solid var(--surface-bg);
    padding-bottom: 8px;
  }
  .post-header { display: flex; align-items: center; gap: 12px; padding: 12px 16px; }
  .avatar {
    width: 40px; height: 40px;
    border-radius: 20px;
    background: var(--brand-primary-soft);
    color: var(--brand-primary);
    font-weight: 800;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
  }
  .author-block { flex: 1; min-width: 0; }
  .author-name { font-weight: 800; font-size: 14px; color: var(--text-primary); }
  .author-meta { color: var(--text-secondary); font-size: 12px; margin-top: 2px; display: flex; align-items: center; gap: 4px; }
  .more-btn { width: 30px; height: 30px; display: flex; align-items: center; justify-content: center; color: var(--text-primary); font-size: 22px; font-weight: 800; }
  .post-media { width: 100%; aspect-ratio: 4 / 5; background: linear-gradient(135deg, #3D6CFF, #FF3D8A); position: relative; }
  .post-media-label {
    position: absolute; bottom: 12px; right: 12px;
    color: white; font-size: 10px; font-weight: 700;
    background: rgba(0,0,0,0.3);
    padding: 3px 8px; border-radius: 6px;
  }
  .post-text { padding: 12px 16px 0; font-size: 14px; line-height: 1.5; color: var(--text-primary); }
  .post-actions {
    display: flex; align-items: center; gap: 16px;
    padding: 12px 16px 8px;
    border-top: 1px solid var(--border-default);
    margin-top: 12px;
  }
  .action {
    display: flex; align-items: center; gap: 6px;
    color: var(--text-secondary);
    font-size: 12px; font-weight: 700;
  }
  .action.like.active { color: var(--content-like); }
  .action.save { margin-left: auto; }
  .action.save.active { color: var(--brand-primary); }

  .navbar {
    display: flex; align-items: center; justify-content: space-around;
    background: var(--surface-surface);
    border-top: 1px solid var(--border-default);
    padding: 8px 6px 16px;
    margin-top: 8px;
  }
  .nav-item { display: flex; flex-direction: column; align-items: center; gap: 3px; flex: 1; }
  .nav-icon {
    width: 34px; height: 34px;
    display: flex; align-items: center; justify-content: center;
    border-radius: 17px;
    color: var(--text-secondary);
  }
  .nav-icon.active { background: var(--brand-primary-soft); color: var(--brand-primary); }
  .nav-icon.plus {
    background: var(--brand-primary);
    color: white;
    width: 54px; height: 54px;
    border-radius: 18px;
    box-shadow: 0 8px 24px rgba(61, 108, 255, 0.45);
    margin-top: -16px;
  }
  .nav-label { font-size: 11px; font-weight: 700; color: var(--text-secondary); }
  .nav-item.active .nav-label { color: var(--brand-primary); }

  .icon-set { width: 22px; height: 22px; stroke: currentColor; fill: none; stroke-width: 1.75; stroke-linecap: round; stroke-linejoin: round; }
  .icon-set.fill { fill: currentColor; stroke: none; }
</style>
</head>
<body>
<div class="label"><b>Главная (тёмная тема)</b> — Editorial Blue, dark</div>

<div class="phone">
  <div class="statusbar">
    <span>9:41</span>
    <div class="right"><span>5G</span><span class="dot"></span><span>100%</span></div>
  </div>

  <div class="topbar">
    <div class="logo">Близз</div>
    <div class="topbar-actions" style="display: flex; gap: 6px;">
      <div class="icon-btn">
        <svg class="icon-set" viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg>
      </div>
      <div class="icon-btn">
        <svg class="icon-set fill" viewBox="0 0 24 24"><path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/><path d="M10 21a2 2 0 0 0 4 0"/></svg>
      </div>
      <div class="icon-btn">
        <svg class="icon-set" viewBox="0 0 24 24"><path d="M21 11.5a8.4 8.4 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.4 8.4 0 0 1-3.8-.9L3 21l1.9-5.7a8.4 8.4 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.4 8.4 0 0 1 3.8-.9h.5a8.5 8.5 0 0 1 8 8z"/></svg>
      </div>
    </div>
  </div>

  <div class="stories">
    <div class="story">
      <div class="story-ring self">+</div>
      <div class="story-name">Ваш Близз</div>
    </div>
    <div class="story">
      <div class="story-ring unseen"><div class="story-inner">А</div></div>
      <div class="story-name">Аня</div>
    </div>
    <div class="story">
      <div class="story-ring"><div class="story-inner" style="background: rgba(255, 169, 104, 0.15); color: #FFA968;">К</div></div>
      <div class="story-name">Кирилл</div>
    </div>
    <div class="story">
      <div class="story-ring unseen"><div class="story-inner" style="background: rgba(50, 213, 131, 0.15); color: #32D583;">D</div></div>
      <div class="story-name">Diner 24</div>
    </div>
  </div>

  <div class="home-tabs">
    <div class="home-tab active">Лента</div>
    <div class="home-tab">Витрина</div>
  </div>

  <div class="post">
    <div class="post-header">
      <div class="avatar">А</div>
      <div class="author-block">
        <div class="author-name">Аня</div>
        <div class="author-meta">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg>
          Парк Горького
        </div>
      </div>
      <div class="more-btn">⋯</div>
    </div>
    <div class="post-media">
      <div class="post-media-label">фото</div>
    </div>
    <div class="post-text">Утренний кофе и никаких планов — лучший план. Поймал рассвет в парке, делюсь кадром.</div>
    <div class="post-actions">
      <div class="action like active">
        <svg viewBox="0 0 24 24" class="icon-set fill"><path d="M12 21s-7-4.5-9.5-9.5C.7 7.5 3 4 6.5 4c2 0 3.5 1 5.5 3 2-2 3.5-3 5.5-3 3.5 0 5.8 3.5 4 7.5C19 16.5 12 21 12 21z"/></svg>
        24
      </div>
      <div class="action">
        <svg class="icon-set" viewBox="0 0 24 24"><path d="M21 11.5a8.4 8.4 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.4 8.4 0 0 1-3.8-.9L3 21l1.9-5.7a8.4 8.4 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.4 8.4 0 0 1 3.8-.9h.5a8.5 8.5 0 0 1 8 8z"/></svg>
        3
      </div>
      <div class="action">
        <svg class="icon-set" viewBox="0 0 24 24"><path d="M22 2 11 13"/><path d="M22 2 15 22 11 13 2 9z"/></svg>
        Поделиться
      </div>
      <div class="action save active">
        <svg class="icon-set fill" viewBox="0 0 24 24"><path d="M19 21 12 16l-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
      </div>
    </div>
  </div>

  <div class="navbar">
    <div class="nav-item active">
      <div class="nav-icon active">
        <svg class="icon-set fill" viewBox="0 0 24 24"><path d="M3 12 12 3l9 9"/><path d="M5 10v10h14V10"/></svg>
      </div>
      <div class="nav-label">Главная</div>
    </div>
    <div class="nav-item">
      <div class="nav-icon">
        <svg class="icon-set fill" viewBox="0 0 24 24"><path d="M6 4v16l14-8z"/></svg>
      </div>
      <div class="nav-label">Видео</div>
    </div>
    <div class="nav-item">
      <div class="nav-icon plus">
        <svg class="icon-set fill" viewBox="0 0 24 24" stroke="currentColor" fill="none" stroke-width="2.5" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
      </div>
    </div>
    <div class="nav-item">
      <div class="nav-icon">
        <svg class="icon-set" viewBox="0 0 24 24"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg>
      </div>
      <div class="nav-label">Карта</div>
    </div>
    <div class="nav-item">
      <div class="nav-icon">
        <svg class="icon-set" viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 21a8 8 0 0 1 16 0"/></svg>
      </div>
      <div class="nav-label">Профиль</div>
    </div>
  </div>
</div>
</body>
</html>
